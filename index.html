<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Maintenance Log</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="page-header">
      <p class="tagline">Assignment 2 Prototype</p>
      <h1>Car Maintenance Log</h1>
      <p class="intro-text">Log a maintenance service for one of my cars and keep the history in the browser between visits.</p>
    </header>

    <section class="form-section" aria-labelledby="form-heading">
      <h2 id="form-heading">Record Maintenance Service</h2>
      <p id="form-message" class="message" aria-live="polite"></p>

      <form id="maintenance-form" novalidate>
        <div class="form-grid">
          <label for="vehicle">Vehicle</label>
          <select id="vehicle" name="vehicle" required>
            <option value="">Select a vehicle</option>
            <option value="2025 Mazda CX-30">2025 Mazda CX-30</option>
            <option value="2016 Honda Accord">2016 Honda Accord</option>
          </select>

          <label for="service-type">Service Type</label>
          <input id="service-type" name="serviceType" type="text" placeholder="Oil change" required>

          <label for="service-date">Service Date</label>
          <input id="service-date" name="serviceDate" type="date" required>

          <label for="mileage">Mileage</label>
          <input id="mileage" name="mileage" type="number" min="0" step="1" placeholder="45000" required>

          <label for="cost">Cost</label>
          <input id="cost" name="cost" type="number" min="0" step="0.01" placeholder="79.99" required>

          <label for="provider">Service Provider</label>
          <input id="provider" name="provider" type="text" placeholder="Main Street Auto" required>

          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="4" placeholder="Optional notes about the service"></textarea>
        </div>

        <div class="button-row">
          <button type="submit">Save Record</button>
          <button id="clear-records-button" class="secondary-button" type="button">Clear Records</button>
        </div>
      </form>
    </section>

    <section class="records-section" aria-labelledby="records-heading">
      <div class="records-title-row">
        <h2 id="records-heading">Saved Records</h2>
        <span id="record-count">0 records</span>
      </div>
      <div id="records-list" class="records-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
